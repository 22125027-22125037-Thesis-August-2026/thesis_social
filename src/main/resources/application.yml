spring:
  application:
    name: thesis-social-features
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${SOCIAL_DB_URL:jdbc:postgresql://localhost:${SOCIAL_DB_PORT:5432}/${SOCIAL_DB_NAME:social_features}}
    username: ${SOCIAL_DB_USER:social}
    password: ${SOCIAL_DB_PASSWORD:social}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${SOCIAL_RABBIT_HOST:localhost}
    port: ${SOCIAL_RABBIT_PORT:5672}
    username: ${SOCIAL_RABBIT_USER:guest}
    password: ${SOCIAL_RABBIT_PASSWORD:guest}

server:
  port: ${SOCIAL_APP_PORT:8080}

social:
  cors:
    allowed-origins: ${SOCIAL_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  security:
    jwt:
      public-key: ${SOCIAL_JWT_PUBLIC_KEY:}
      signing-kid: ${SOCIAL_JWT_SIGNING_KID:}
      issuer: ${SOCIAL_JWT_ISSUER:therapist-auth}
      audience: ${SOCIAL_JWT_AUDIENCE:social-features}
  websocket:
    endpoint: ${SOCIAL_WS_ENDPOINT:/ws}
    app-destination-prefix: /app
    user-destination-prefix: /user
  broker:
    relay-host: ${SOCIAL_STOMP_RELAY_HOST:localhost}
    relay-port: ${SOCIAL_STOMP_RELAY_PORT:61613}
    relay-client-login: ${SOCIAL_STOMP_RELAY_LOGIN:guest}
    relay-client-passcode: ${SOCIAL_STOMP_RELAY_PASSCODE:guest}
    relay-system-login: ${SOCIAL_STOMP_SYSTEM_LOGIN:guest}
    relay-system-passcode: ${SOCIAL_STOMP_SYSTEM_PASSCODE:guest}
  event:
    exchange: ${SOCIAL_EVENTS_EXCHANGE:social.domain.events}
    routing-prefix: ${SOCIAL_EVENTS_ROUTING_PREFIX:social}
